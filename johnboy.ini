[johnboy]
ai_backend = deepseek
ai_model = deepseek-chat
ai_enabled = true
enabled_modules = file_tracker,todo_extractor,git_integration,dependency_mapper
scan_timeout = 30
report_format = markdown

[file_patterns]
code_extensions = .py,.js,.ts,.jsx,.tsx,.vue,.go,.java,.rs,.c,.cpp,.h,.hpp,.rb,.php,.swift,.kt,.scala,.cs,.pb,.pbi,.html,.htm
ignore_directories = node_modules,__pycache__,.git,dist,build,target,.vscode,.idea,coverage,.nyc_output,.pytest_cache,venv,env,.env
ignore_files = *.log,*.tmp,.DS_Store,*.pyc,*.class,*.min.js,*.bundle.js,package-lock.json,yarn.lock

[ai_analysis]
max_files_for_ai = 5
focus_on_recent = true
include_security_scan = true

[output]
report_filename = johnboy_report.md
generate_claude_md = true
update_terminal_status = true
send_notifications = false

[performance]
file_scan_limit = 1000
max_file_size_mb = 10
parallel_processing = false
scan_timeout = 30

[deepseek_config]
timeout = 60

[code_quality]
enabled = true
max_line_length = 120
check_autopep8 = true
check_isort = true
check_flake8 = true
check_mypy = true
check_vulture = true
check_bandit = true
check_pylint = true
auto_fix = false
ignore_missing_tools = true

[claude_integration]
compact_mode = off
auto_compact_after_scan = false
compact_confirmation = true
compact_delay_seconds = 2
min_delay_minutes = 5

